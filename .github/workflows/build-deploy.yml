name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet-version: ['8.0.x']
        node-version: [24.x]
    
    steps:
      - name: Clear GitHub Actions cache
        run: |
          gh extension install actions/gh-actions-cache
          gh actions-cache delete --all --confirm
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
      
      - name: Verify Program.cs content
        working-directory: ./server
        run: cat Program.cs
      
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Show .NET version
        run: dotnet --version
      
      - name: Build server (.NET)
        working-directory: ./server
        run: |
          dotnet clean PairingApp.csproj || true
          dotnet restore PairingApp.csproj
          dotnet build PairingApp.csproj -c Release --no-restore
      
      - name: Install client dependencies
        working-directory: ./client
        run: npm install
      
      - name: Build client
        working-directory: ./client
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .
          retention-days: 7

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./
      
      - name: Setup .NET 8.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Publish API
        working-directory: ./server
        run: dotnet publish PairingApp.csproj -c Release -o ./publish
      
      - name: Create API deployment package
        working-directory: ./server
        run: |
          mkdir -p api-deploy
          cp -r publish/* api-deploy/
          cp web.config api-deploy/ 2>/dev/null || true
          cd api-deploy
          zip -r ../api-app.zip . -x ".git/*" ".gitignore" "*.md"
      
      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "app-cc-api-be-wcus-001"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ./server/api-app.zip

  deploy-frontend:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./
      
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./deploy-frontend
      
      - name: Create frontend deployment package
        run: |
          cd ./deploy-frontend
          # Create deployment directory with flat structure
          mkdir -p fe-deploy
          # Copy server files to root
          cp client/server.js fe-deploy/
          cp client/package.json fe-deploy/
          [ -f client/package-lock.json ] && cp client/package-lock.json fe-deploy/ || true
          [ -f client/web.config ] && cp client/web.config fe-deploy/ || true
          # Copy public files
          cp -r client/public fe-deploy/
          # Install dependencies in deployment folder
          cd fe-deploy
          npm install --production
          # Zip everything
          zip -r ../frontend-app.zip . 
          cd ..
          ls -lah frontend-app.zip
      
      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "app-cc-fe-wcus-001"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FE }}
          package: ./deploy-frontend/frontend-app.zip
